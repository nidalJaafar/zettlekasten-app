<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zettelkasten</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #0b0b10;
        color: #ddd8c6;
        height: 100vh;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { height: 100vh; }

      /* Thin scrollbars */
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #252534; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #363652; }

      /* CodeMirror 6 dark overrides */
      .cm-editor { background: #13131c !important; }
      .cm-editor .cm-scroller {
        background: #13131c !important;
        font-family: 'DM Mono', 'Menlo', 'Monaco', 'Courier New', monospace !important;
        font-size: 13px !important;
        line-height: 1.75 !important;
      }
      .cm-editor .cm-content { background: #13131c !important; color: #ddd8c6 !important; }
      .cm-editor.cm-focused { outline: none !important; box-shadow: none !important; }
      .cm-editor .cm-activeLine { background: rgba(255,255,255,0.018) !important; }
      .cm-editor .cm-cursor { border-left: 1.5px solid #c09a38 !important; }
      .cm-editor .cm-selectionBackground, .cm-editor ::selection {
        background: rgba(192,154,56,0.15) !important;
      }
      .cm-editor .cm-gutters { background: #13131c !important; border: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
